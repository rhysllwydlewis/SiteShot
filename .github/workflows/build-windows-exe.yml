name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run verification
        run: npm run verify

      - name: Build Windows installer
        run: npm run dist:installer

      - name: Ensure bundled browser exists
        shell: pwsh
        run: |
          $browser = Get-ChildItem -Path "playwright-browsers" -Recurse -Filter "chrome-headless-shell.exe" | Select-Object -First 1
          if (-not $browser) { throw "Bundled Chromium was not created under playwright-browsers" }
          $browser | Format-Table FullName, Length

      - name: Ensure installer exists and is substantial
        shell: pwsh
        run: |
          $installer = Join-Path "release" "install.exe"
          if (-not (Test-Path $installer)) { throw "No Windows install.exe was created" }
          $item = Get-Item $installer
          if ($item.Length -lt 100MB) { throw "install.exe is too small to plausibly include the bundled browser runtime: $($item.Length) bytes" }
          $item | Format-Table FullName, Length

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: SiteShot-Auditor-Studio-Ultra-Installer
          path: release/install.exe
