name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npm run install:browsers

      - name: Run syntax checks
        run: npm run check

      - name: Run repo checks
        run: npm run check:repo

      - name: Run config checks
        run: npm run check:config

      - name: Run installer checks
        run: npm run check:installer

      - name: Run app preflight
        run: npm run preflight

      - name: Build Windows installer
        run: npm run dist:installer

      - name: Ensure installer exists
        shell: pwsh
        run: |
          $installer = Join-Path "release" "install.exe"
          if (-not (Test-Path $installer)) { throw "No Windows install.exe was created" }
          Get-Item $installer | Format-Table FullName, Length

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: SiteShot-Auditor-Studio-Ultra-Installer
          path: release/install.exe
