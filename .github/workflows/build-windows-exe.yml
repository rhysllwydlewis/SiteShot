name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run dist:win
      - name: Ensure EXE exists
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path release -Recurse -Filter *.exe
          if (-not $exe) { throw "No EXE was created" }
      - uses: actions/upload-artifact@v4
        with:
          name: SiteShot-Auditor-Studio-Ultra-Windows
          path: release
