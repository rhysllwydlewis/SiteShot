name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build unpacked Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npm run install:browsers

      - name: Run syntax checks
        run: npm run check

      - name: Run repo checks
        run: npm run check:repo

      - name: Run app preflight
        run: npm run preflight

      - name: Build Windows app folder
        run: npm run dist:win

      - name: Ensure EXE exists
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path release -Recurse -Filter *.exe
          if (-not $exe) { throw "No EXE was created" }
          $exe | Format-Table FullName, Length

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: SiteShot-Auditor-Studio-Ultra-Windows
          path: release
