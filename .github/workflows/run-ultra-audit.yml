name: Run Ultra Website Audit

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Website URL"
        required: true
        default: "https://event-flow.co.uk"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: node bin/siteshot.mjs audit --config examples/eventflow.ultra-audit.json --url "${{ github.event.inputs.target_url }}"
      - uses: actions/upload-artifact@v4
        with:
          name: siteshot-ultra-audit-report
          path: audit/eventflow-ultra
