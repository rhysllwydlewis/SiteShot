name: Run Ultra Website Audit

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Website URL"
        required: true
        default: "https://event-flow.co.uk"

permissions:
  contents: read

jobs:
  audit:
    name: Run public SiteShot audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public EventFlow audit
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
        run: node bin/siteshot.mjs audit --config examples/eventflow-public.ultra-audit.json --url "$TARGET_URL"

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        with:
          name: siteshot-ultra-audit-public
          path: audit
