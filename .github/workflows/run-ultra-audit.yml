name: Run Ultra Website Audit

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Website URL"
        required: true
        default: "https://event-flow.co.uk"

jobs:
  audit:
    name: Run public SiteShot audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public EventFlow audit
        run: node bin/siteshot.mjs audit --config examples/eventflow-public.ultra-audit.json --url "${{ github.event.inputs.target_url }}"

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        with:
          name: siteshot-ultra-audit-public
          path: audit
