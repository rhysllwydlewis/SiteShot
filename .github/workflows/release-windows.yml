name: Release Windows Build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v3.2.23"
        required: true
        default: "v3.2.23"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run verification
        run: npm run verify

      - name: Build Windows installer
        run: npm run dist:installer

      - name: Ensure bundled browser exists
        shell: pwsh
        run: |
          $browser = Get-ChildItem -Path "playwright-browsers" -Recurse -Filter "chrome-headless-shell.exe" | Select-Object -First 1
          if (-not $browser) { throw "Bundled Chromium was not created under playwright-browsers" }
          $browser | Format-Table FullName, Length

      - name: Ensure install.exe exists and is substantial
        shell: pwsh
        run: |
          $installer = Join-Path "release" "install.exe"
          if (-not (Test-Path $installer)) { throw "No Windows install.exe was created" }
          $item = Get-Item $installer
          if ($item.Length -lt 100MB) { throw "install.exe is too small to plausibly include the bundled browser runtime: $($item.Length) bytes" }
          $item | Format-Table FullName, Length

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: SiteShot Auditor Studio Ultra ${{ github.event.inputs.tag_name }}
          body: |
            SiteShot Auditor Studio Ultra Windows release.

            Download the single Windows installer: `install.exe`.

            Run install.exe, keep the desktop shortcut option selected, then launch SiteShot Auditor Studio from the desktop or Start Menu.
          files: |
            release/install.exe
