name: Release Windows Build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v3.2.23"
        required: true
        default: "v3.2.23"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npm run install:browsers

      - name: Run syntax checks
        run: npm run check

      - name: Run repo checks
        run: npm run check:repo

      - name: Run config checks
        run: npm run check:config

      - name: Run installer checks
        run: npm run check:installer

      - name: Run app preflight
        run: npm run preflight

      - name: Build Windows installer
        run: npm run dist:installer

      - name: Ensure install.exe exists
        shell: pwsh
        run: |
          $installer = Join-Path "release" "install.exe"
          if (-not (Test-Path $installer)) { throw "No Windows install.exe was created" }
          Get-Item $installer | Format-Table FullName, Length

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: SiteShot Auditor Studio Ultra ${{ github.event.inputs.tag_name }}
          body: |
            SiteShot Auditor Studio Ultra Windows release.

            Download the single Windows installer: `install.exe`.

            Run install.exe, keep the desktop shortcut option selected, then launch SiteShot Auditor Studio from the desktop or Start Menu.
          files: |
            release/install.exe
